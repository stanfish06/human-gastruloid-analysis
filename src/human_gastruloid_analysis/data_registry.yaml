# Registry of datasets published alongside this project.
#
# Processed datasets are hosted on Zenodo, record 21313315
# (https://zenodo.org/records/21313315, DOI 10.5281/zenodo.21313315), one
# ``<subdir>.tar.gz`` archive per dataset. Raw GEO files are fetched from NCBI.
#
# Each top-level key is a dataset (a "set" of files that is uploaded to Zenodo
# as a single ``<subdir>.tar.gz`` archive). Fields:
#
#   subdir      folder the files live in, created under the download directory.
#   link        paper / publication the data belongs to.
#   source      where the raw data originally came from (optional).
#   need_unzip  true  -> the whole set is one tar.gz that is extracted on download.
#               false -> each file in ``checklist`` is downloaded as-is (no extract).
#   archive     (optional) tar.gz name on Zenodo; defaults to "<subdir>.tar.gz".
#   url         (optional) explicit download URL, overrides the Zenodo lookup.
#   record_id   (optional) per-dataset Zenodo record id, overrides the global one.
#   checklist   list of files, each with a "file" name and a "description"
#               (a list of free-text lines). Add new files here.

IH-2025-nature:
  subdir: IH-2025-nature-data
  link: https://www.nature.com/articles/s41592-025-02669-4
  source:
  need_unzip: true
  record_id: "21313315"
  checklist:
    - file: adata_timeseries_old_48-96h.h5ad
      description:
        - 2D gastruloid data from day 2 to day 4
        - raw count
    - file: adata_timeseries_old_48-96h_new_D6-10_filtered_qc.h5ad
      description:
        - 2D gastruloid data from day 2 to day 10
        - raw count
    - file: 240925_adata_combined.h5ad
      description:
        - 2D gastruloid data from day 2 to day 4
        - integrated (old, dont use)
        - anndata.X is normalized (library size+log1p)
        - highly variable genes selected
        - anndata.raw has all genes, normalized (library size+log1p)
    - file: adata_timeseries_all_cc_hvg1000_leiden10_23_v3.h5ad
      description:
        - 2D gastruloid data from day 2 to day 4
        - integrated (use this)
        - anndata.X is normalized (library size+log1p)
        - highly variable genes selected
        - anndata.raw has all genes, normalized (library size+log1p)
        - X_scVI_cc is the scvi latent coordinates
    - file: adata_2020_force_9000.h5ad
      description:
        - first 42h gastruloid data
    - file: adata_2021_BMP_contorl.h5ad
      description:
        - second 42h gastruloid data
    - file: MP_old_48-96h_new_D6-10_meta.csv
      description:
        - meta for 2D gastruloid data from day 2 to day 10
        - store in anndata.obs
    - file: MP_old_48-96h_scvi_coords.csv
      description:
        - scvi latent coordinates for 2D gastruloid data from day 2 to day 4

